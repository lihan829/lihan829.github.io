title: Han Li
description:  PhD Candidate in Linguistics | Computational Phonology
theme: just-the-docs

url: "https://lihan829.github.io/"
favicon_ico: "/images/favicon.ico"

defaults:
  - scope:
      path: "docs" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: "default"

# Enable or disable heading anchors
heading_anchors: true

# Aux links for the upper right navigation

aux_links:
  GitHub: https://github.com/lihan829
  LinkedIn: https://www.linkedin.com/in/lihan61
  Google Scholar: https://scholar.google.com/citations?user=2_Fyp30AAAAJ&hl=en
  Email: mailto:han.li.4@stonybrook.edu


# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: false

# Enable or disable the side/mobile menu globally
# Nav menu can also be selectively enabled or disabled using page variables or the minimal layout
nav_enabled: true
# Footer content
# appears at the bottom of every page's main content

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"


# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%b %e %Y at %I:%M %p" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html


# Color scheme currently only supports "dark", "light"/nil (default), or a custom scheme that you define
color_scheme: nil

# When commented out, callouts_level defaults to quiet for the light scheme, and loud for dark
# callouts_level: quiet # or loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
